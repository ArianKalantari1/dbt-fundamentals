models:
  - name: stg_jaffle_shop__customers
    description: grain of this table is one unique customer per row.
    columns:
      - name: customer_id
        description: A unique identifier for each customer. primary key for the customer table
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
  - name: stg_jaffle_shop__orders
    description: grain is one order per row
    columns:
      - name: order_id
        description: PK for order table
        data_tests:
          - unique
          - not_null
      - name: order_status
        description: "{{ doc('order_status' )}}"
        data_tests:
        - accepted_values:
            arguments:
              values: ['placed', 'returned', 'completed', 'return_pending', 'shipped']
      - name: customer_id
        description: Identifier linking the order to a specific customer.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null