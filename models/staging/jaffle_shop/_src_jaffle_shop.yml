sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of postgres application database.
    config:
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 7
          period: day
      loaded_at_field: _etl_loaded_at
    tables:
      - name: customers
        description: raw customer data
        columns:
          - name: id
            description: primary key for customer data
            data_tests:
              - unique
              - not_null
        config:
          freshness: null
      - name: orders
        description: raw orders data (this is the original untransformed data!)
        columns:
          - name: id
            description: primary key for orders data
            data_tests:
              - unique
              - not_null